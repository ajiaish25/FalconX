<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cdkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#FF9900" stroke-width="2"/>
  
  <!-- Main CDK text/logo -->
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="url(#cdkGradient)">CDK</text>
  
  <!-- Decorative element -->
  <path d="M 60 110 Q 100 140 140 110" stroke="#FF9900" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- CDK label -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#333333">Cloud Development Kit</text>
</svg>
